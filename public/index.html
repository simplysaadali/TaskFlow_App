<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>My To-Do List</h1>
    <p>Saad Ali · UOG</p>

    <div class="input-area">
        <input id="addTask" type="text" placeholder="Enter a task...">
        <button id="add-btn">Add</button>
    </div>

    <div class="task-list" id="task-list"></div>

    <div class="footer">
        <span id="count"></span> tasks — loaded from the server
    </div>

    <div class="bottom">
        Browser&nbsp;&nbsp;&nbsp; fetch() &nbsp;&nbsp;&nbsp;Node server&nbsp;&nbsp;&nbsp; data
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
